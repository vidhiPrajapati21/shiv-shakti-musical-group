<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center">

                        Login

                    </h3>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label>Username</label>

                            <input
                            type="text"
                            name="username"
                            class="form-control">

                        </div>

                        <div class="mb-3">

                            <label>Password</label>

                            <input
                            type="password"
                            name="password"
                            class="form-control">

                        </div>

                        <button
                        class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
