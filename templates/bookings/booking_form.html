{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">
                    🎵 Booking Form
                </h3>

            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button
                    type="submit"
                    class="btn btn-success">

                        Save Booking

                    </button>

                    <a
                    href="/bookings/"
                    class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
