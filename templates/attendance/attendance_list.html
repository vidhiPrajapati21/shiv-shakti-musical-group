{% extends 'base.html' %}

{% block content %}

<h2>Attendance</h2>

<a href="{% url 'attendance_add' %}"
class="btn btn-primary mb-3">

Add Attendance

</a>

<table class="table table-striped table-hover shadow">

<tr>
    <th>Worker</th>
    <th>Event</th>
    <th>Date</th>
    <th>Status</th>
    <th>Salary</th>
    <th>Action</th>
</tr>

{% for a in attendances %}

<tr>
    <td>{{ a.worker }}</td>
    <td>{{ a.event }}</td>
    <td>{{ a.date }}</td>
    <td>{{ a.status }}</td>
    <td>₹{{ a.salary }}</td>

    <td>

        <a href="{% url 'attendance_edit' a.id %}"
        class="btn btn-warning">

        Edit

        </a>

        <a href="{% url 'attendance_delete' a.id %}"
        class="btn btn-danger">

        Delete

        </a>

    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
